<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Budget Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="app__header">
    <div class="app__title">
      <span class="app__mark">§</span>
      <div>
        <h1>Ledger</h1>
        <p class="app__subtitle">a running account of where it goes</p>
      </div>
    </div>
    <div class="app__balance">
      <span class="app__balance-label">total spent this month</span>
      <span class="app__balance-value" id="monthTotal">$0.00</span>
    </div>
  </header>

  <main class="app__body">

    <section class="panel panel--form">
      <h2 class="panel__title">New entry</h2>
      <label class="field">
        <span class="field__label">Show month</span>
        <select id="monthFilter">
          <option value="all">All time</option>
        </select>
      </label>
      <form id="entryForm" class="entry-form">
        <label class="field">
          <span class="field__label">Description</span>
          <input type="text" id="desc" placeholder="Coffee, rent, train ticket…" required>
        </label>

        <div class="field-row">
          <label class="field field--amount">
            <span class="field__label">Amount</span>
            <div class="amount-input">
              <span>$</span>
              <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
            </div>
          </label>

          <label class="field field--category">
            <span class="field__label">Category</span>
            <select id="category" required>
              <option value="" disabled selected>Choose one</option>
              <option>Food</option>
              <option>Transport</option>
              <option>Housing</option>
              <option>Fun</option>
              <option>Health</option>
              <option>Other</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span class="field__label">Date</span>
          <input type="date" id="date" required>
        </label>

        <button type="submit" class="btn-post">Post to ledger</button>
      </form>

      <div class="panel__divider"></div>

      <h2 class="panel__title">By category</h2>
      <div class="chart-wrap">
        <canvas id="categoryChart"></canvas>
      </div>

      <h2 class="panel__title">By day</h2>
      <div class="chart-wrap">
        <canvas id="trendChart"></canvas>
      </div>
    </section>

    <section class="panel panel--tape">
      <h2 class="panel__title panel__title--tape">Receipt tape</h2>
      <div class="tape" id="tape">
        <p class="tape__empty" id="tapeEmpty">Nothing posted yet.<br>Your first entry will print here.</p>
      </div>
    </section>

  </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
